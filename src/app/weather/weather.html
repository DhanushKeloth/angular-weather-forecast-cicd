<div class="container">

  <button (click)="loadWeather()">
    Load Weather
  </button>

  <br><br>

  <table border="1" *ngIf="forecasts().length">

    <tr>
      <th>Date</th>
      <th>Temp °C</th>
      <th>Temp °F</th>
      <th>Summary</th>
    </tr>

    <tr *ngFor="let forecast of forecasts()">
      <td>{{ forecast.date }}</td>
      <td>{{ forecast.temperatureC }}</td>
      <td>{{ forecast.temperatureF }}</td>
      <td>{{ forecast.summary }}</td>
    </tr>

  </table>

</div>
